[pytest]
addopts = -ra -v
markers =
    chatbot: tests that target the chatbot (Subsystem A)
    rag: tests that target the RAG explorer (Subsystem B)
    quality: quality metrics (higher score is better)
    safety: safety metrics (lower score is better — bias, toxicity)
    slow: makes real LLM calls; slower
    needs_chatbot: requires the chatbot app running on :8201
    needs_rag: requires the RAG explorer running on :8202
