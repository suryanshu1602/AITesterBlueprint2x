[pytest]
addopts = -ra -v
markers =
    chatbot: tests that target the chatbot (Subsystem A)
    rag: tests that target the RAG explorer (Subsystem B)
    browserbash: tests that target the live BrowserBash bot on aleepup.com (judge = OpenAI gpt-5-mini)
    quality: quality metrics (higher score is better)
    safety: safety metrics (lower score is better — bias, toxicity)
    retrieval: retrieval-quality metrics (contextual precision/recall/relevancy)
    geval: LLM-rubric G-Eval metrics (correctness, citation, helpfulness, summarization)
    conversational: multi-turn metrics (conversation completeness, knowledge retention)
    slow: makes real LLM calls; slower
    needs_chatbot: requires the chatbot app running on :8201
    needs_rag: requires the RAG explorer running on :8202
    needs_browserbash: requires the live BrowserBash bot reachable on aleepup.com
